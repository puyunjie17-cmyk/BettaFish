<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0b10" />
  <meta name="description" content="从一个创意生成网文、漫剧剧本与分镜脚本的 AI 创作工作台。" />
  <title>StoryForge · 爆款网文与 AI 漫剧工作台</title>
  <style>
    :root {
      --bg: #090a0f;
      --panel: #11131b;
      --panel-2: #171a24;
      --panel-3: #1d2130;
      --line: rgba(255,255,255,.09);
      --line-strong: rgba(255,255,255,.17);
      --text: #f6f3eb;
      --muted: #aaa9b3;
      --faint: #737580;
      --accent: #ff6a3d;
      --accent-2: #ffb74d;
      --accent-soft: rgba(255,106,61,.13);
      --green: #5ed7a1;
      --yellow: #ffd166;
      --red: #ff6b7c;
      --blue: #70a8ff;
      --purple: #b38cff;
      --shadow: 0 22px 70px rgba(0,0,0,.35);
      --radius: 18px;
      --radius-sm: 12px;
      --sidebar: 276px;
      --topbar: 70px;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
    }
    button, input, select, textarea { font: inherit; }
    button { color: inherit; }
    a { color: inherit; }
    ::selection { background: rgba(255,106,61,.34); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-track { background: transparent; }

    .app-shell { min-height: 100vh; display: grid; grid-template-columns: var(--sidebar) minmax(0, 1fr); }
    .sidebar {
      position: fixed; inset: 0 auto 0 0; width: var(--sidebar); z-index: 30;
      display: flex; flex-direction: column; background: rgba(12,13,19,.94);
      border-right: 1px solid var(--line); backdrop-filter: blur(18px);
    }
    .brand { padding: 22px 18px 17px; border-bottom: 1px solid var(--line); }
    .brand-row { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 40px; height: 40px; border-radius: 13px; display: grid; place-items: center;
      background: linear-gradient(145deg, var(--accent), #ff3e65); box-shadow: 0 10px 30px rgba(255,91,64,.25);
      font-weight: 900; letter-spacing: -.04em;
    }
    .brand-title { font-weight: 800; letter-spacing: -.02em; }
    .brand-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .sidebar-actions { padding: 14px; display: grid; gap: 10px; }
    .btn {
      border: 1px solid var(--line); background: var(--panel-2); border-radius: 12px; padding: 10px 14px;
      cursor: pointer; transition: .18s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-weight: 700; min-height: 42px;
    }
    .btn:hover { transform: translateY(-1px); border-color: var(--line-strong); background: var(--panel-3); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .48; cursor: not-allowed; transform: none; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #ff3f68); border-color: transparent; color: #fff; box-shadow: 0 10px 26px rgba(255,83,67,.22); }
    .btn-primary:hover { background: linear-gradient(135deg, #ff7a4f, #ff5277); }
    .btn-warm { background: linear-gradient(135deg, #ffb24c, #ff7b45); border-color: transparent; color: #18120c; }
    .btn-ghost { background: transparent; }
    .btn-danger { color: #ff9aa6; border-color: rgba(255,107,124,.22); background: rgba(255,107,124,.08); }
    .btn-sm { min-height: 34px; padding: 7px 10px; border-radius: 10px; font-size: 13px; }
    .btn-icon { width: 38px; min-width: 38px; padding: 0; }
    .search-wrap { position: relative; }
    .search-wrap input { padding-left: 34px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--faint); font-size: 13px; }
    .projects { padding: 0 10px 14px; overflow: auto; flex: 1; }
    .project-card {
      padding: 12px; border-radius: 13px; border: 1px solid transparent; cursor: pointer; margin-bottom: 6px;
      transition: .16s ease; position: relative;
    }
    .project-card:hover { background: rgba(255,255,255,.04); }
    .project-card.active { background: var(--accent-soft); border-color: rgba(255,106,61,.24); }
    .project-card-title { font-size: 14px; font-weight: 750; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 22px; }
    .project-card-meta { margin-top: 6px; display: flex; justify-content: space-between; color: var(--faint); font-size: 11px; }
    .project-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 6px; }
    .sidebar-foot { padding: 13px 15px 16px; border-top: 1px solid var(--line); color: var(--faint); font-size: 11px; line-height: 1.55; }

    .main { grid-column: 2; min-width: 0; }
    .topbar {
      position: sticky; top: 0; z-index: 20; height: var(--topbar); display: flex; align-items: center; justify-content: space-between;
      gap: 14px; padding: 0 22px; border-bottom: 1px solid var(--line); background: rgba(9,10,15,.78); backdrop-filter: blur(20px);
    }
    .topbar-left, .topbar-right { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .mobile-menu { display: none; }
    .project-heading { min-width: 0; }
    .project-heading input {
      border: 0; padding: 0; background: transparent; color: var(--text); font-size: 17px; font-weight: 800;
      width: min(430px, 44vw); outline: none; text-overflow: ellipsis;
    }
    .project-heading .save-state { color: var(--faint); font-size: 11px; margin-top: 3px; }
    .status-dot { width: 7px; height: 7px; border-radius: 99px; background: var(--green); box-shadow: 0 0 0 4px rgba(94,215,161,.12); }
    .status-dot.offline { background: var(--yellow); box-shadow: 0 0 0 4px rgba(255,209,102,.12); }
    .model-select { max-width: 250px; min-width: 170px; }
    .auth-btn { white-space: nowrap; }

    .stage-strip {
      position: sticky; top: var(--topbar); z-index: 15; display: flex; gap: 8px; overflow-x: auto;
      padding: 12px 22px; border-bottom: 1px solid var(--line); background: rgba(9,10,15,.89); backdrop-filter: blur(18px);
    }
    .stage-pill {
      flex: 0 0 auto; border: 1px solid var(--line); background: rgba(255,255,255,.025); color: var(--muted);
      padding: 8px 12px; border-radius: 999px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700;
    }
    .stage-pill .num { width: 21px; height: 21px; border-radius: 99px; display: grid; place-items: center; background: rgba(255,255,255,.06); font-size: 10px; }
    .stage-pill.active { color: #fff; background: var(--accent-soft); border-color: rgba(255,106,61,.28); }
    .stage-pill.active .num { background: var(--accent); }
    .stage-pill.done .num { background: rgba(94,215,161,.18); color: var(--green); }

    .content { padding: 26px 28px 70px; max-width: 1540px; margin: 0 auto; }
    .page-head { display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; margin-bottom: 22px; }
    .eyebrow { color: var(--accent-2); font-size: 12px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: clamp(26px, 3vw, 42px); line-height: 1.12; letter-spacing: -.04em; margin: 8px 0 10px; }
    h2 { font-size: 20px; letter-spacing: -.02em; }
    h3 { font-size: 15px; }
    .lead { color: var(--muted); max-width: 760px; line-height: 1.75; font-size: 14px; margin-bottom: 0; }
    .page-actions { display: flex; flex-wrap: wrap; gap: 9px; justify-content: flex-end; }

    .hero-panel {
      border: 1px solid rgba(255,255,255,.1); background:
        radial-gradient(circle at 12% 10%, rgba(255,106,61,.13), transparent 38%),
        radial-gradient(circle at 90% 0%, rgba(179,140,255,.12), transparent 36%),
        linear-gradient(160deg, rgba(255,255,255,.038), rgba(255,255,255,.015));
      border-radius: 24px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 18px;
    }
    .hero-grid { display: grid; grid-template-columns: minmax(0,1.5fr) minmax(280px,.7fr); gap: 18px; }
    .idea-box textarea { min-height: 210px; font-size: 17px; line-height: 1.8; background: rgba(6,7,11,.54); }
    .idea-prompts { display: grid; gap: 10px; }
    .prompt-chip {
      border: 1px solid var(--line); background: rgba(255,255,255,.025); padding: 12px; border-radius: 13px; cursor: pointer;
      color: var(--muted); line-height: 1.45; font-size: 13px; text-align: left;
    }
    .prompt-chip:hover { border-color: rgba(255,106,61,.3); color: var(--text); background: var(--accent-soft); }

    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.038), rgba(255,255,255,.02));
      border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; min-width: 0;
    }
    .card-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 14px; }
    .card-title { font-weight: 800; letter-spacing: -.01em; }
    .card-sub { color: var(--faint); font-size: 12px; margin-top: 4px; }
    .soft-card { background: rgba(255,255,255,.018); }
    .metric { padding: 15px; }
    .metric-label { color: var(--faint); font-size: 11px; }
    .metric-value { font-size: 23px; font-weight: 850; margin-top: 7px; letter-spacing: -.03em; }
    .metric-note { color: var(--muted); font-size: 11px; margin-top: 6px; }
    .metric-value.accent { color: var(--accent-2); }

    label { display: block; color: var(--muted); font-size: 12px; font-weight: 700; margin-bottom: 7px; }
    input, select, textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 11px; background: rgba(5,6,10,.42); color: var(--text);
      padding: 10px 12px; outline: none; transition: .16s ease;
    }
    input:focus, select:focus, textarea:focus { border-color: rgba(255,106,61,.55); box-shadow: 0 0 0 3px rgba(255,106,61,.09); }
    textarea { resize: vertical; min-height: 120px; line-height: 1.65; }
    select { cursor: pointer; }
    .field { min-width: 0; }
    .field-row { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
    .help { color: var(--faint); font-size: 11px; margin-top: 6px; line-height: 1.5; }
    .counter { color: var(--faint); font-size: 11px; }

    .editor-layout { display: grid; grid-template-columns: minmax(0,1fr) 300px; gap: 16px; align-items: start; }
    .editor-card { padding: 0; overflow: hidden; }
    .editor-toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 12px; background: rgba(255,255,255,.025); border-bottom: 1px solid var(--line);
    }
    .editor-toolbar .spacer { flex: 1; }
    .editor-toolbar input, .editor-toolbar select { width: auto; min-width: 90px; padding: 8px 10px; min-height: 36px; }
    .editor-title-input { min-width: 240px !important; flex: 1; }
    .editor-area {
      width: 100%; border: 0; border-radius: 0; min-height: 620px; padding: 22px; background: rgba(6,7,11,.34);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "PingFang SC", monospace;
      font-size: 14px; line-height: 1.85;
    }
    .editor-area:focus { box-shadow: inset 0 0 0 1px rgba(255,106,61,.38); }
    .side-stack { display: grid; gap: 14px; position: sticky; top: calc(var(--topbar) + 70px); }
    .chapter-list { max-height: 320px; overflow: auto; display: grid; gap: 6px; }
    .chapter-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; cursor: pointer; color: var(--muted); border: 1px solid transparent;
    }
    .chapter-item:hover { background: rgba(255,255,255,.04); }
    .chapter-item.active { background: var(--accent-soft); border-color: rgba(255,106,61,.22); color: var(--text); }
    .chapter-num { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: rgba(255,255,255,.055); font-size: 11px; font-weight: 800; }
    .chapter-name { min-width: 0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
    .chapter-state { width: 7px; height: 7px; border-radius: 99px; background: var(--faint); }
    .chapter-state.ready { background: var(--green); }

    .output {
      min-height: 520px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "PingFang SC", monospace;
      font-size: 13px; line-height: 1.8; white-space: pre-wrap;
    }
    .output-lg { min-height: 680px; }
    .review-box { min-height: 230px; }
    .empty-state {
      min-height: 310px; display: grid; place-items: center; text-align: center; color: var(--faint); padding: 30px;
      border: 1px dashed var(--line-strong); border-radius: 15px; background: rgba(255,255,255,.015);
    }
    .empty-icon { font-size: 34px; margin-bottom: 12px; filter: grayscale(.2); }
    .empty-state strong { display: block; color: var(--muted); margin-bottom: 6px; }

    .score-grid { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 10px; }
    .score-card { padding: 14px; border-radius: 13px; border: 1px solid var(--line); background: rgba(255,255,255,.02); }
    .score-row { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
    .score-name { color: var(--muted); font-size: 12px; }
    .score-num { font-weight: 850; }
    .bar { height: 5px; border-radius: 99px; background: rgba(255,255,255,.07); overflow: hidden; margin-top: 10px; }
    .bar span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: inherit; }

    .workflow {
      display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 10px; margin-top: 16px;
    }
    .workflow-step { padding: 14px; border-radius: 14px; border: 1px solid var(--line); background: rgba(255,255,255,.02); }
    .workflow-step .tag { color: var(--accent-2); font-size: 10px; font-weight: 900; letter-spacing: .12em; }
    .workflow-step strong { display: block; margin: 8px 0 5px; font-size: 13px; }
    .workflow-step p { color: var(--faint); font-size: 11px; line-height: 1.55; margin: 0; }

    .checklist { display: grid; gap: 8px; }
    .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.055); }
    .check-item:last-child { border-bottom: 0; }
    .check-mark { width: 20px; height: 20px; border-radius: 7px; display: grid; place-items: center; background: rgba(94,215,161,.12); color: var(--green); flex: 0 0 auto; font-size: 11px; }
    .check-text strong { font-size: 12px; display: block; }
    .check-text span { font-size: 11px; color: var(--faint); line-height: 1.45; }

    .notice { padding: 12px 14px; border-radius: 12px; background: rgba(112,168,255,.08); border: 1px solid rgba(112,168,255,.17); color: #c7d9ff; font-size: 12px; line-height: 1.6; }
    .notice-warm { background: rgba(255,183,77,.08); border-color: rgba(255,183,77,.18); color: #ffe0ad; }
    .notice-red { background: rgba(255,107,124,.08); border-color: rgba(255,107,124,.18); color: #ffc3ca; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 999px; font-size: 11px; border: 1px solid var(--line); color: var(--muted); }
    .pill.green { color: var(--green); background: rgba(94,215,161,.07); border-color: rgba(94,215,161,.18); }
    .pill.warm { color: var(--accent-2); background: rgba(255,183,77,.07); border-color: rgba(255,183,77,.18); }

    .busy-line { position: fixed; top: 0; left: var(--sidebar); right: 0; height: 3px; z-index: 100; overflow: hidden; display: none; }
    .busy-line.show { display: block; }
    .busy-line::before { content: ""; display: block; height: 100%; width: 36%; background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent); animation: loading 1.25s infinite ease-in-out; }
    @keyframes loading { from { transform: translateX(-120%); } to { transform: translateX(340%); } }
    .busy-pop {
      position: fixed; right: 22px; bottom: 22px; z-index: 90; min-width: 280px; max-width: 430px;
      background: rgba(18,20,29,.97); border: 1px solid var(--line-strong); border-radius: 16px; padding: 14px 15px; box-shadow: var(--shadow);
      display: none; backdrop-filter: blur(18px);
    }
    .busy-pop.show { display: block; }
    .busy-pop-row { display: flex; gap: 11px; align-items: center; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.13); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; flex: 0 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .busy-title { font-size: 13px; font-weight: 800; }
    .busy-sub { color: var(--faint); font-size: 11px; margin-top: 3px; line-height: 1.45; }

    .toast-root { position: fixed; right: 18px; top: 84px; z-index: 120; display: grid; gap: 9px; pointer-events: none; }
    .toast { width: min(360px, calc(100vw - 36px)); border-radius: 13px; padding: 12px 14px; border: 1px solid var(--line-strong); background: rgba(20,22,31,.97); box-shadow: var(--shadow); pointer-events: auto; animation: toastIn .2s ease; }
    .toast strong { display: block; font-size: 13px; margin-bottom: 3px; }
    .toast span { color: var(--muted); font-size: 11px; line-height: 1.45; }
    .toast.ok { border-color: rgba(94,215,161,.25); }
    .toast.warn { border-color: rgba(255,209,102,.25); }
    .toast.err { border-color: rgba(255,107,124,.28); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-6px); } }

    .modal-backdrop { position: fixed; inset: 0; z-index: 110; background: rgba(0,0,0,.64); display: grid; place-items: center; padding: 20px; backdrop-filter: blur(8px); }
    .modal { width: min(700px, 100%); max-height: min(760px, 92vh); overflow: auto; background: #141720; border: 1px solid var(--line-strong); border-radius: 22px; box-shadow: var(--shadow); }
    .modal-head { padding: 18px 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .modal-body { padding: 20px; }
    .modal-foot { padding: 15px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 9px; }
    .kbd { padding: 2px 6px; border-radius: 6px; border: 1px solid var(--line); background: rgba(255,255,255,.04); color: var(--muted); font-size: 10px; }

    .mobile-overlay { display: none; }
    @media (max-width: 1160px) {
      :root { --sidebar: 246px; }
      .grid-4, .score-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .hero-grid, .editor-layout { grid-template-columns: 1fr; }
      .side-stack { position: static; grid-template-columns: repeat(2,minmax(0,1fr)); }
      .model-select { max-width: 200px; }
    }
    @media (max-width: 820px) {
      :root { --sidebar: 282px; --topbar: 62px; }
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { transform: translateX(-102%); transition: .2s ease; box-shadow: var(--shadow); }
      body.sidebar-open .sidebar { transform: translateX(0); }
      .mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.58); z-index: 25; display: none; }
      body.sidebar-open .mobile-overlay { display: block; }
      .main { grid-column: 1; }
      .mobile-menu { display: inline-flex; }
      .topbar { padding: 0 12px; }
      .topbar-right .model-select { display: none; }
      .project-heading input { width: min(50vw, 330px); }
      .stage-strip { padding: 10px 12px; top: var(--topbar); }
      .content { padding: 20px 14px 60px; }
      .page-head { flex-direction: column; }
      .page-actions { justify-content: flex-start; }
      .grid-2, .grid-3, .grid-4, .score-grid, .workflow, .field-row, .side-stack { grid-template-columns: 1fr; }
      .hero-panel { padding: 16px; }
      .busy-line { left: 0; }
      .busy-pop { left: 12px; right: 12px; bottom: 12px; min-width: 0; }
      .editor-toolbar .spacer { display: none; }
      .editor-title-input { min-width: 100% !important; order: 10; }
      .editor-area { min-height: 520px; padding: 15px; }
    }
    @media (max-width: 520px) {
      .auth-label, .settings-label { display: none; }
      .project-heading .save-state { display: none; }
      .page-actions .btn { width: 100%; }
      .hero-panel .btn { width: 100%; }
      .stage-pill { padding: 7px 10px; }
      .stage-pill .label { max-width: 78px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    }

    .boot-screen {
      position: fixed; inset: 0; z-index: 9999; display: grid; place-items: center;
      background: #090a0f; color: #f6f3eb; padding: 24px;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    }
    .boot-card { width: min(520px, 100%); text-align: center; padding: 28px; }
    .boot-mark {
      width: 52px; height: 52px; margin: 0 auto 16px; border-radius: 16px; display: grid; place-items: center;
      font-weight: 900; background: linear-gradient(145deg,#ff6a3d,#ff3e65); box-shadow: 0 18px 50px rgba(255,62,101,.2);
    }
    .boot-title { font-weight: 800; font-size: 18px; }
    .boot-detail { margin-top: 9px; color: #9697a3; font-size: 13px; line-height: 1.65; overflow-wrap: anywhere; }
    .boot-screen.error .boot-mark { background: #712934; }

        ui: { stage:'brief', activeChapter:1, activeEpisode:1 }
      };
      return Object.assign(p, seed.patch || {});
    }
    function normalizeProject(p) {
      const base = createProject();
      const merged = { ...base, ...p, brief:{...base.brief,...(p.brief||{})}, outputs:{...base.outputs,...(p.outputs||{})}, ui:{...base.ui,...(p.ui||{})} };
      merged.chapters = Array.isArray(p.chapters) && p.chapters.length ? p.chapters.map((c,i)=>({number:i+1,title:'',content:'',review:'',...c})) : base.chapters;
      merged.episodes = Array.isArray(p.episodes) && p.episodes.length ? p.episodes.map((e,i)=>({number:i+1,title:'',script:'',review:'',shots:'',...e})) : base.episodes;
      return merged;
    }

    function stageCompletion(p, key) {

        novel: p.chapters.some(c=>c.content.trim()), screenplay: !!p.outputs.episodePlan.trim() && p.episodes.some(e=>e.script.trim()),
        shots: p.episodes.some(e=>e.shots.trim()), quality: !!p.outputs.globalAudit.trim()

          const el = document.querySelector('.save-state');
          if (el) el.textContent = '保存受限，请导出 JSON 备份';

      };
      clearTimeout(saveTimer);

    function createMockPuter() {
      const choose = prompt => {
        if (/精修后的完整章节|这是精修任务/.test(prompt)) return mockData.chapter;
        if (/待审核章节|待审核剧本|全链路质检/.test(prompt)) return '# 专家质检报告\n\n## 总评\n核心钩子强，视觉化程度高。当前主要问题是主角的情感支点略弱，能力代价需要更早、更具体地兑现。\n\n## 八维评分\n- 首屏钩子：92\n- 冲突升级：86\n- 人物可信度：78\n- 情绪兑现：82\n- 连载驱动力：89\n- 连续性：84\n- 漫剧可制作性：91\n- 原创区分度：85\n\n## 优先修改\n1. 在第一章加入主角“不敢遗忘某个人”的私人情感证据。\n2. 第二章必须立刻展示能力代价，而不是只口头说明。\n3. 每个单元死者都要反照主角主线，避免纯案件拼盘。';
        if (/拆成可生产的AI漫剧分镜脚本|必须输出Markdown表格，列为：镜号/.test(prompt)) return mockData.shots;
        if (/完整AI漫剧剧本|只输出可制作剧本/.test(prompt)) return mockData.episode;
        if (/改编成\d+集|分集季纲/.test(prompt)) return mockData.episodePlan;
        if (/当前任务：撰写第|只输出“章节标题 \+ 正文”/.test(prompt)) return mockData.chapter;
        if (/设计\d+章长篇网文大纲|长篇网文大纲/.test(prompt)) return mockData.outline;
        if (/建立一份“IP圣经”|用于约束后续长篇网文/.test(prompt)) return mockData.bible;
        return mockData.market;
      };
      return {
        auth: { isSignedIn:()=>true, signIn:async()=>({username:'demo-user'}), getUser:async()=>({username:'demo-user'}) },
        ai: {
          listModels: async()=>[
            {id:'gpt-5.5',provider:'openai',name:'GPT-5.5（演示）',context:200000},
            {id:'claude-sonnet-4-6',provider:'claude',name:'Claude Sonnet 4.6（演示）',context:200000},
            {id:'gpt-5.4-nano',provider:'openai',name:'GPT-5.4 nano（演示）',context:128000}
          ],
          chat: async(messages, options={}) => {
            const prompt = Array.isArray(messages) ? messages.filter(m=>m.role==='user').map(m=>typeof m.content==='string'?m.content:'').join('\n') : String(messages);
            const text = choose(prompt);
            if (options.stream) {
              async function* stream() {
                for (let i=0;i<text.length;i+=42) {
                  await new Promise(r=>setTimeout(r, 8));
                  yield {type:'text', text:text.slice(i,i+42)};
                }
              }
              return stream();
            }
            return {message:{content:text}};
          }
        }
      };
    }

    async function ensurePuter() {
      if (MOCK_MODE) {
        if (!window.puter || !window.puter.__storyforgeMock) {
          window.puter = createMockPuter(); window.puter.__storyforgeMock = true;
        }
        return window.puter;
      }
      if (window.puter) return window.puter;
      if (puterPromise) return puterPromise;
      puterPromise = new Promise((resolve,reject) => {
        const script = document.createElement('script');
        script.src = 'https://js.puter.com/v2/';
        script.async = true;
        script.onload = () => resolve(window.puter);
        script.onerror = () => reject(new Error('无法加载 AI 服务组件，请检查网络或浏览器拦截设置。'));
        document.head.appendChild(script);
        setTimeout(() => { if (!window.puter) reject(new Error('AI 服务加载超时，请刷新后重试。')); }, 20000);
      }).finally(() => { if (!window.puter) puterPromise = null; });
      return puterPromise;
    }

    async function connectAI() {
      try {
        setBusy('连接 AI 服务','首次使用会打开 Puter 登录窗口；每位用户承担自己的模型用量。');
        const puter = await ensurePuter();
        if (!puter?.auth) throw new Error('AI 服务组件未正确加载。');
        if (!puter.auth.isSignedIn()) await puter.auth.signIn();
        authUser = await puter.auth.getUser();
        clearBusy(); render();
        toast('AI 已连接', `当前用户：${authUser?.username||authUser?.name||'Puter 用户'}`,'ok');
        loadModels(true);
      } catch (err) { clearBusy(); toast('连接失败', errorMessage(err),'err',6500); }
    }
    async function checkAuth() {
      try {
        const puter = await ensurePuter();
        if (puter?.auth?.isSignedIn?.()) authUser = await puter.auth.getUser();
        render();
      } catch { /* 首屏允许离线编辑 */ }
    }
    function modelRank(m) {
      const id = (m.id||'').toLowerCase();
      const prefs = ['gpt-5.5','claude-opus-4-8','claude-sonnet-4-6','gpt-5.4','gemini-3.1-pro','deepseek'];
      const idx = prefs.findIndex(x=>id.includes(x));
      return idx < 0 ? 999 : idx;
    }
    async function loadModels(showToast=false) {
      try {
        const puter = await ensurePuter();
        const list = await puter.ai.listModels();
        modelList = (Array.isArray(list)?list:[])
          .filter(m=>m?.id && !/image|vision-only|embedding|audio|speech|video/i.test(`${m.id} ${m.name||''}`))
          .sort((a,b)=>modelRank(a)-modelRank(b) || String(a.name||a.id).localeCompare(String(b.name||b.id)))
          .slice(0,120);
        const select = document.querySelector('.model-select');
        if (select) select.innerHTML = modelOptions();
        if (showToast) toast('模型列表已更新', `已读取 ${modelList.length} 个可用文本模型。`);
      } catch (err) { if (showToast) toast('模型列表读取失败', errorMessage(err),'warn'); }
    }
    function errorMessage(err) {
      if (!err) return '未知错误';
      if (typeof err === 'string') return err;
      return err.message || err.error?.message || err.code || JSON.stringify(err).slice(0,260);
    }
    function responseText(result) {
      const c = result?.message?.content ?? result?.text ?? result;
      if (typeof c === 'string') return c;
      if (Array.isArray(c)) return c.map(x=>typeof x==='string'?x:(x?.text||'')).join('');
      return String(c||'');
    }
    async function ensureSignedIn() {
      const puter = await ensurePuter();
      if (!puter?.auth?.isSignedIn?.()) await puter.auth.signIn();
      authUser = await puter.auth.getUser();
      return puter;
    }
    async function callAI({title, system=SYSTEM_BASE, prompt, onText, maxTokens=settings.maxTokens, temperature=settings.temperature}) {
      if (busy) throw new Error('已有生成任务正在进行。');
      setBusy(title);
      try {
        const puter = await ensureSignedIn();
        const messages = [{role:'system',content:system},{role:'user',content:prompt}];
        const opts = { model:settings.model, stream:true, temperature:Number(temperature)||0.9, max_tokens:Number(maxTokens)||9000 };
        if (/gpt|openai|\bo\d/i.test(settings.model)) { opts.reasoning_effort = settings.reasoning; opts.verbosity = 'high'; }
        let text = '';
        try {
          const stream = await puter.ai.chat(messages, opts);
          for await (const part of stream) {
            if (part?.type === 'error') throw new Error(part.message || '模型返回流式错误');
            const chunk = part?.text || (part?.type==='text'?part.text:'') || '';
            if (chunk) { text += chunk; onText?.(text, chunk); }
          }
        } catch (streamErr) {
          if (text.trim()) throw streamErr;
          const fallbackOpts = {...opts, stream:false};
          const result = await puter.ai.chat(messages, fallbackOpts);
          text = responseText(result);
          onText?.(text, text);
        }
        if (!text.trim()) throw new Error('模型没有返回有效文本。');
        touchProject(); persist(true);
        clearBusy(); updateAuthUI();
        return text;
      } catch (err) { clearBusy(); throw err; }
    }
    async function generateToPath({title,prompt,path,system,maxTokens,temperature,rerender=false}) {
      const p = activeProject();
      setByPath(p,path,''); persist(true);
      try {
        const text = await callAI({title,prompt,system,maxTokens,temperature,onText:(full)=>{
          setByPath(p,path,full); touchProject(p); persist();
          const el = findElementForPath(path); if (el) { el.value = full; el.scrollTop = el.scrollHeight; }
        }});
        setByPath(p,path,text); touchProject(p); persist(true);
        if (rerender) render(); else renderBusyOnly();
        toast('生成完成', title,'ok');
        return text;
      } catch (err) { toast('生成失败', errorMessage(err),'err',7000); throw err; }
    }
    function findElementForPath(path) {
      const p = activeProject();
      if (path.startsWith('chapters.')) {
        const key = path.split('.').at(-1); return document.querySelector(`[data-chapter-path="${key}"]`);
      }
      if (path.startsWith('episodes.')) {
        const key = path.split('.').at(-1); return document.querySelector(`[data-episode-path="${key}"]`);
      }
      return document.querySelector(`[data-path="${path}"]`);
    }

    function markdownTableToCsv(md='') {
      const lines = String(md).split('\n').filter(line=>/^\s*\|.*\|\s*$/.test(line));
      const rows = lines.map(line=>line.trim().slice(1,-1).split('|').map(v=>v.trim()));
      const filtered = rows.filter(row=>!row.every(cell=>/^:?-{3,}:?$/.test(cell)));
      return filtered.map(row=>row.map(cell=>'"'+cell.replace(/"/g,'""')+'"').join(',')).join('\n');
    }

    document.addEventListener('input', (ev) => {
      const el = ev.target, p=activeProject();
      if (el.id==='project-search') { searchTerm=el.value; const pos=el.selectionStart; render(); const next=document.getElementById('project-search'); next?.focus(); next?.setSelectionRange(pos,pos); return; }
      if (el.dataset.path) {
        let v = el.type==='number' ? Number(el.value) : el.value;
        setByPath(p,el.dataset.path,v); touchProject(p); persist();
        if (el.dataset.path==='brief.idea') document.getElementById('idea-count').textContent=countChineseChars(v)+' 字';
        return;
      }
      if (el.dataset.chapterPath) {
        const c=activeChapter(p); c[el.dataset.chapterPath]=el.value; touchProject(p); persist();
        if (el.dataset.chapterPath==='content') document.getElementById('chapter-count').textContent=countChineseChars(el.value)+' 字';
        return;
      }
      if (el.dataset.episodePath) { activeEpisode(p)[el.dataset.episodePath]=el.value; touchProject(p); persist(); return; }
      if (el.dataset.setting) {
        const key=el.dataset.setting; settings[key]=(el.type==='range'||el.type==='number')?Number(el.value):el.value; persist();
        if(key==='temperature') document.getElementById('temperature-label')?.replaceChildren(document.createTextNode(el.value));
      }
    });
    document.addEventListener('change', (ev)=>{
      const el=ev.target;
      if (el.dataset.actionChange==='jump-chapter') setChapter(el.value);
      if (el.dataset.actionChange==='jump-episode') setEpisode(el.value);
      if (el.dataset.setting) { settings[el.dataset.setting]=(el.type==='number'||el.type==='range')?Number(el.value):el.value; persist(true); const top=document.querySelector('.model-select'); if(top&&el.dataset.setting==='model') top.value=el.value; }
    });
    document.addEventListener('click', async (ev) => {
      const target = ev.target.closest('[data-action]'); if (!target) return;
      const action=target.dataset.action, p=activeProject();
      try {
        if (action==='open-sidebar') document.body.classList.add('sidebar-open');
        else if (action==='close-sidebar') document.body.classList.remove('sidebar-open');
        else if (action==='new-project') { const n=createProject(); projects.unshift(n); activeId=n.id; persist(true); document.body.classList.remove('sidebar-open'); render(); }
        else if (action==='select-project') { activeId=target.dataset.id; persist(true); document.body.classList.remove('sidebar-open'); render(); }
        else if (action==='stage') { p.ui.stage=target.dataset.stage; touchProject(p); persist(true); render(); }
        else if (action==='use-sample') { p.brief.idea=SAMPLE_IDEAS[Number(target.dataset.index)]||''; if(p.name==='未命名故事') p.name='新故事 '+(Number(target.dataset.index)+1); touchProject(p); persist(true); render(); }
        else if (action==='connect-ai') await connectAI();
        else if (action==='settings') openSettings();
        else if (action==='close-modal') closeModal();
        else if (action==='reload-models') await loadModels(true);
        else if (action==='generate-market') await generateMarket();
        else if (action==='generate-bible') await generateBible();
        else if (action==='generate-outline') await generateOutline();
        else if (action==='generate-chapter') await generateChapter(false);
        else if (action==='review-chapter') await reviewChapter();
        else if (action==='rewrite-chapter') await generateChapter(true);
        else if (action==='generate-episode-plan') await generateEpisodePlan();
        else if (action==='generate-episode') await generateEpisode();
        else if (action==='review-episode') await reviewEpisode();
        else if (action==='generate-shots') await generateShots();
        else if (action==='global-audit') await globalAudit();
        else if (action==='pipeline-assets') await runAssetPipeline();
        else if (action==='pipeline-sample') await runSamplePipeline();
        else if (action==='add-chapter') addChapter();
        else if (action==='select-chapter') setChapter(target.dataset.number);
        else if (action==='prev-chapter') setChapter(Number(p.ui.activeChapter)-1);
        else if (action==='next-chapter') setChapter(Number(p.ui.activeChapter)+1);
        else if (action==='add-episode') addEpisode();
        else if (action==='select-episode') setEpisode(target.dataset.number);
        else if (action==='prev-episode') setEpisode(Number(p.ui.activeEpisode)-1);
        else if (action==='next-episode') setEpisode(Number(p.ui.activeEpisode)+1);
        else if (action==='copy') { const el=document.getElementById(target.dataset.target); await copyText(el?.value||el?.textContent||''); }
        else if (action==='copy-project') await copyText(projectMarkdown(p));
        else if (action==='download-markdown') downloadFile(safeFileName(p.name)+'.md',projectMarkdown(p),'text/markdown;charset=utf-8');
        else if (action==='download-json') downloadFile(safeFileName(p.name)+'.json',JSON.stringify(p,null,2),'application/json;charset=utf-8');
        else if (action==='download-shots-csv') { const e=activeEpisode(p); if(!e.shots.trim()) return toast('当前集没有分镜','先生成分镜脚本。','warn'); downloadFile(`${safeFileName(p.name)}-EP${String(e.number).padStart(2,'0')}-shots.csv`, '\ufeff'+markdownTableToCsv(e.shots),'text/csv;charset=utf-8'); }
        else if (action==='delete-project') {
          if (projects.length===1) return toast('至少保留一个项目','可以新建项目后再删除。','warn');
          if (confirm(`确定删除“${p.name}”吗？此操作只影响当前浏览器，且无法撤销。`)) { projects=projects.filter(x=>x.id!==p.id); activeId=projects[0].id; persist(true); closeModal(); render(); toast('项目已删除'); }
        }
      } catch (err) { if (!/已有生成任务/.test(errorMessage(err))) toast('操作失败',errorMessage(err),'err'); }
    });

    window.addEventListener('keydown', (ev)=>{
      if ((ev.ctrlKey||ev.metaKey) && ev.key.toLowerCase()==='s') { ev.preventDefault(); persist(true); toast('已保存'); }
      if (ev.key==='Escape') { closeModal(); document.body.classList.remove('sidebar-open'); }
    });
    window.addEventListener('beforeunload', ()=>persist(true));

    render();
    document.getElementById('boot-screen')?.remove();
    setTimeout(()=>checkAuth(), 60);
    setTimeout(()=>loadModels(false), 900);
  })();
  </script>
</body>
</html>
